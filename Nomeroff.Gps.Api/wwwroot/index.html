<!DOCTYPE html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Nomeroff GPS API</title>
<style>
  *{box-sizing:border-box}
    body {
        font-family: system-ui,'Segoe UI',sans-serif;
        max-width: 560px;
        margin: 40px auto;
        padding: 0 16px;
        background: rgba(26, 26, 39, 1);
        color: #e6edf3
    }
  h1{font-size:1.5rem;margin-bottom:8px}
  .sub{color:#8b949e;font-size:0.9rem;margin-bottom:24px}
  .btn{display:inline-block;padding:10px 18px;margin:4px 8px 4px 0;border:none;border-radius:8px;font-size:14px;cursor:pointer;text-decoration:none;transition:transform .15s}
  .btn:hover{transform:scale(1.02)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .btn-primary{background:#238636;color:#fff}
  .btn-secondary{background:#21262d;color:#e6edf3;border:1px solid #30363d}
  .btn-success{background:#1a7f37;color:#fff}
  .btn-danger{background:#da3633;color:#fff}
  .cards{display:flex;flex-wrap:wrap;gap:12px;margin:20px 0}
  .card{flex:1;min-width:200px;padding:16px;background:#161b22;border:1px solid #21262d;border-radius:10px}
  .card h3{font-size:0.85rem;margin:0 0 8px;color:#8b949e;text-transform:uppercase}
  .card .value{font-size:1.25rem;font-weight:600;word-break:break-all}
  .result{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:16px;margin:16px 0;min-height:80px;white-space:pre-wrap}
  .ok{color:#3fb950}
  .err{color:#f85149}
  .links{margin-top:24px}
  .links a{color:#58a6ff;margin-right:16px}
</style>
</head><body>
    <h1>Nomeroff GPS API</h1>
    <p class='sub'>Проверка GPS на COM-порту</p>
    <div class='cards'>
        <div class='card'><h3>Статус</h3><div class='value' id='status'>—</div></div>
        <div class='card'><h3>Координаты</h3><div class='value' id='coords'>—</div></div>
    </div>
    <p>
        <strong>Порт:</strong> <select id='port' style='padding:8px;border-radius:6px;background:#21262d;color:#e6edf3;border:1px solid #30363d'><option value='COM3'>COM3</option></select>
        <button class='btn btn-secondary' onclick='refreshPorts()'>Обновить</button>
    </p>
    <p><strong>Действия:</strong></p>
    <button class='btn btn-primary' onclick='checkStatus()'>Проверить соединение</button>
    <button class='btn btn-success' onclick='connect()'>Подключить</button>
    <button class='btn btn-danger' onclick='disconnect()'>Отключить</button>
    <button class='btn btn-primary' onclick='getCoords()'>Получить координаты</button>
    <button class='btn btn-success' onclick='connectAndGetCoords()'>Подключить и получить координаты</button>
    <div class='result' id='result'>Нажмите «Проверить соединение» или «Подключить» для начала.</div>
    <div class='links'><a href='/swagger'>Swagger UI</a></div>
    <script>
        const r = document.getElementById('result'), s = document.getElementById('status'), c = document.getElementById('coords'), portSelect = document.getElementById('port');
        function show(txt, ok) { r.textContent = txt; r.className = 'result ' + (ok ? 'ok' : 'err') }
        function getPort() { return portSelect.value || 'COM3' }
        async function checkStatus() { try { const res = await fetch('/api/status'); const d = await res.json(); s.textContent = d.connected ? 'Подключено' : 'Нет'; if (d.hasPosition) { c.textContent = d.latitude.toFixed(6) + ', ' + d.longitude.toFixed(6) } else { c.textContent = '—' } show(JSON.stringify(d, null, 2), true) } catch (e) { show('Ошибка: ' + e.message, false) } }
        async function refreshPorts() { try { const res = await fetch('/api/ports'); const arr = await res.json(); portSelect.innerHTML = arr.length ? arr.map(p => '<option value="' + p + '"' + (p === 'COM3' ? ' selected' : '') + '>' + p + '</option>').join('') : '<option>COM3</option>'; show('Порты: ' + arr.join(', ') || 'пусто', true) } catch (e) { show('Ошибка: ' + e.message, false) } }
        async function connect() { const port = getPort(); try { const res = await fetch('/api/connect', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ port }) }); const d = await res.json(); show(d.success ? 'Подключено к ' + port + '. Ожидайте фиксации спутников (10–60 сек).' : 'Не удалось подключиться к ' + port + '. Проверьте порт.', d.success); await checkStatus() } catch (e) { show('Ошибка: ' + e.message, false) } }
        async function getCoords() { try { const res = await fetch('/api/position'); const d = await res.json(); if (d) { s.textContent = 'OK'; c.textContent = d.latitude.toFixed(6) + ', ' + d.longitude.toFixed(6); show('Широта: ' + d.latitude + '\nДолгота: ' + d.longitude, true) } else { show('Координаты пока недоступны. Подключите GPS и подождите фиксации.', false) } } catch (e) { show('Ошибка: ' + e.message, false) } }
        async function connectAndGetCoords() { const port = getPort(); r.textContent = 'Подключаюсь к ' + port + '...'; await connect(); for (let i = 0; i < 12; i++) { await new Promise(x => setTimeout(x, 3000)); const res = await fetch('/api/position'); const d = await res.json(); if (d) { s.textContent = 'OK'; c.textContent = d.latitude.toFixed(6) + ', ' + d.longitude.toFixed(6); show('Координаты получены!\nШирота: ' + d.latitude + '\nДолгота: ' + d.longitude, true); return } r.textContent = 'Ожидание спутников... (' + (i + 1) * 3 + ' сек)'; } show('За 36 сек фиксации не было. Попробуйте ещё раз или выйдите на открытое небо.', false) }
        async function disconnect() { try { await fetch('/api/disconnect', { method: 'POST' }); s.textContent = '—'; c.textContent = '—'; show('Отключено', true) } catch (e) { show('Ошибка: ' + e.message, false) } }
        refreshPorts();
    </script>
</body></html>
